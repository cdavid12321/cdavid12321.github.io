<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFF Starter</title>
    <style>
        html {
            font-size: 11px;
        }

        table {
            width: 100%;
            table-layout: fixed;
            word-break: break-all;
        }

        div {
            max-width: 100%;
            text-align: center;
        }

        th {
            text-align: center;
        }

        table,
        th,
        td {
            border: 1px solid black;
        }

        img {
            max-width: 25%;
            height: auto;
        }

        button {
            margin: 4px;
        }

        #code-block {
            background-color: #eee;
            border: 1px solid #999;
            display: block;
            padding: 20px;
            width: 50%;
            margin-left: auto;
            margin-right: auto;
            overflow-x: auto;
            white-space: nowrap;
        }

        #profilePictureDiv {
            text-align: center;
        }

        #profileImageDiv {
            height: 100px;
            width: 100px;
        }

        #statusMessage {
            position: relative;
            top: 40px;
        }

        .textLeft {
            text-align: left;
        }

        .buttonGroup {
            position: relative;
            top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
    <script src="jquery-3.3.1.min.js"></script>
    <script src="bootstrap.min.js"></script>
    <link href="bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container">
            <div class="col-md-6" style="margin:5px">
                <label>uid:</label>
                <input class="form-control" type="text" id="msg-uid" value="" /><br />
                <label>學號:</label>
                <input class="form-control" type="text" id="msg-num" value="" /><br />
                <label>電話:</label>
                <input class="form-control" type="text" id="msg-pho" value="" /><br />
                <label>溫度:</label>
                <input class="form-control" type="text" id="msg-temp" value="" /><br />
                <label>備註:</label>
                <input class="form-control" type="text" id="msg-special" value="" /><br />
                <button class="btn btn-primary" id="ButtonSendMsg"  >回報發燒紀錄</button>
            </div>
    </div>
    <!-- LIFF INIT ERROR -->
    <div id="liffInitErrorMessage" class="hidden">
        <p>Something went wrong with LIFF initialization.</p>
        <p>LIFF initialization can fail if a user clicks "Cancel" on the "Grant permission" screen, or if an error
            occurs in
            the process of <code>liff.init()</code>.
    </div>
    <!-- NODE.JS LIFF ID ERROR -->
    <div id="nodeLiffIdErrorMessage" class="hidden">
        <p>Unable to receive the LIFF ID as an environment variable.</p>
    </div>
    <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
    <script>
        window.onload = function () {
            const useNodeJS = false; // if you are not using a node server, set this value to false
            const defaultLiffId =
            "1566533074-8jxEYM3o"; // change the default LIFF value if you are not using a node server

            // DO NOT CHANGE THIS
            let myLiffId = "";

            // if node is used, fetch the environment variable and pass it to the LIFF method
            // otherwise, pass defaultLiffId
            if (useNodeJS) {
                fetch('/send-id')
                    .then(function (reqResponse) {
                        return reqResponse.json();
                    })
                    .then(function (jsonResponse) {
                        myLiffId = jsonResponse.id;
                        initializeLiffOrDie(myLiffId);
                    })
                    .catch(function (error) {
                        document.getElementById("liffAppContent").classList.add('hidden');
                        document.getElementById("nodeLiffIdErrorMessage").classList.remove('hidden');
                    });
            } else {
                myLiffId = defaultLiffId;
                initializeLiffOrDie(myLiffId);
            }
        };

        /**
         * Check if myLiffId is null. If null do not initiate liff.
         * @param {string} myLiffId The LIFF ID of the selected element
         */
        function initializeLiffOrDie(myLiffId) {
            if (!myLiffId) {
                document.getElementById("liffAppContent").classList.add('hidden');
                document.getElementById("liffIdErrorMessage").classList.remove('hidden');
            } else {
                initializeLiff(myLiffId);
            }
        }

        /**
         * Initialize LIFF
         * @param {string} myLiffId The LIFF ID of the selected element
         */
        function initializeLiff(myLiffId) {
            liff
                .init({
                    liffId: myLiffId
                })
                .then(() => {
                    // start to use LIFF's api
                    initializeApp();
                })
                .catch((err) => {
                    document.getElementById("liffAppContent").classList.add('hidden');
                    document.getElementById("liffInitErrorMessage").classList.remove('hidden');
                });
        }

        /**
         * Initialize the app by calling functions handling individual app components
         */
        function initializeApp() {
            displayLiffData();
            displayIsInClientInfo();
            registerButtonHandlers();

            // check if the user is logged in/out, and disable inappropriate button
            if (liff.isLoggedIn()) {
                document.getElementById('liffLoginButton').disabled = true;
            } else {
                document.getElementById('liffLogoutButton').disabled = true;
            }
        }

        /**
         * Display data generated by invoking LIFF methods
         */
        function displayLiffData() {
            document.getElementById('browserLanguage').textContent = liff.getLanguage();
            document.getElementById('sdkVersion').textContent = liff.getVersion();
            document.getElementById('isInClient').textContent = liff.isInClient();
            document.getElementById('isLoggedIn').textContent = liff.isLoggedIn();
            document.getElementById('deviceOS').textContent = liff.getOS();
        }

        /**
         * Toggle the login/logout buttons based on the isInClient status, and display a message accordingly
         */
        function displayIsInClientInfo() {
            if (liff.isInClient()) {
                document.getElementById('liffLoginButton').classList.toggle('hidden');
                document.getElementById('liffLogoutButton').classList.toggle('hidden');
                document.getElementById('isInClientMessage').textContent =
                    'You are opening the app in the in-app browser of LINE.';
            } else {
                document.getElementById('isInClientMessage').textContent =
                    'You are opening the app in an external browser.';
            }
        }

        /**
         * Register event handlers for the buttons displayed in the app
         */
        function registerButtonHandlers() {
            // openWindow call
            document.getElementById('openWindowButton').addEventListener('click', function () {
                liff.openWindow({
                    url: 'https://line.me',
                    external: true
                });
            });
            $('#ButtonSendMsg').click(function () {
                liff.sendMessages([
                 {
                     type: 'text',
                     text: ('{"uid":"'+($('#msg-uid').val())+'",'+ '"number":"'+($('#msg-num').val())+'",'+'"phone":"'+($('#msg-pho').val())+'",'+'"temp":"'+($('#msg-temp').val())+'",'+'"special":"'+($('#msg-special').val())+'"}')
                 }
                ])
               .then(() => {
                   alert('done');
               })
            });

            // closeWindow call
            document.getElementById('closeWindowButton').addEventListener('click', function () {
                if (!liff.isInClient()) {
                    sendAlertIfNotInClient();
                } else {
                    liff.closeWindow();
                }
            });

            // sendMessages call
            document.getElementById('sendMessageButton').addEventListener('click', function () {
                if (!liff.isInClient()) {
                    sendAlertIfNotInClient();
                } else {
                    liff.sendMessages([{
                        'type': 'text',
                        'text': liff.getOS()
                    }]).then(function () {
                        window.alert('Message sent');
                    }).catch(function (error) {
                        window.alert('Error sending message: ' + error);
                    });
                }
            });

            // scanCode call
            document.getElementById('scanQrCodeButton').addEventListener('click', function () {
                if (!liff.isInClient()) {
                    sendAlertIfNotInClient();
                } else {
                    liff.scanCode().then(result => {
                        // e.g. result = { value: "Hello LIFF app!" }
                        const stringifiedResult = JSON.stringify(result);
                        document.getElementById('scanQrField').textContent = stringifiedResult;
                        toggleQrCodeReader();
                    }).catch(err => {
                        document.getElementById('scanQrField').textContent = "scanCode failed!";
                    });
                }
            });

            // get access token
            document.getElementById('getAccessToken').addEventListener('click', function () {
                if (!liff.isLoggedIn() && !liff.isInClient()) {
                    alert(
                        'To get an access token, you need to be logged in. Please tap the "login" button below and try again.');
                } else {
                    const accessToken = liff.getAccessToken();
                    document.getElementById('accessTokenField').textContent = accessToken;
                    toggleAccessToken();
                }
            });

            // get profile call
            document.getElementById('getProfileButton').addEventListener('click', function () {
                liff.getProfile().then(function (profile) {
                    document.getElementById('userIdProfileField').textContent = profile.userId;
                    document.getElementById('displayNameField').textContent = profile.displayName;

                    const profilePictureDiv = document.getElementById('profilePictureDiv');
                    if (profilePictureDiv.firstElementChild) {
                        profilePictureDiv.removeChild(profilePictureDiv.firstElementChild);
                    }
                    const img = document.createElement('img');
                    img.src = profile.pictureUrl;
                    img.alt = 'Profile Picture';
                    profilePictureDiv.appendChild(img);

                    document.getElementById('statusMessageField').textContent = profile.statusMessage;
                    toggleProfileData();
                }).catch(function (error) {
                    window.alert('Error getting profile: ' + error);
                });
            });

            // login call, only when external browser is used
            document.getElementById('liffLoginButton').addEventListener('click', function () {
                if (!liff.isLoggedIn()) {
                    // set `redirectUri` to redirect the user to a URL other than the front page of your LIFF app.
                    liff.login();
                }
            });

            // logout call only when external browse
            document.getElementById('liffLogoutButton').addEventListener('click', function () {
                if (liff.isLoggedIn()) {
                    liff.logout();
                    window.location.reload();
                }
            });
        }

        /**
         * Alert the user if LIFF is opened in an external browser and unavailable buttons are tapped
         */
        function sendAlertIfNotInClient() {
            alert('This button is unavailable as LIFF is currently being opened in an external browser.');
        }

        /**
         * Toggle access token data field
         */
        function toggleAccessToken() {
            toggleElement('accessTokenData');
        }

        /**
         * Toggle profile info field
         */
        function toggleProfileData() {
            toggleElement('profileInfo');
        }

        /**
         * Toggle scanCode result field
         */
        function toggleQrCodeReader() {
            toggleElement('scanQr');
        }

        /**
         * Toggle specified element
         * @param {string} elementId The ID of the selected element
         */
        function toggleElement(elementId) {
            const elem = document.getElementById(elementId);
            if (elem.offsetWidth > 0 && elem.offsetHeight > 0) {
                elem.style.display = 'none';
            } else {
                elem.style.display = 'block';
            }
        }
    </script>
</body>

</html>
